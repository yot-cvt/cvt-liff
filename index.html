<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ลงทะเบียนผู้ป่วย CVT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { background-color: #f4f7f6; padding: 20px; font-family: sans-serif; }
      .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 5vh; border: none;}
      .brand-title { color: #00b900; font-weight: bold; } 
    </style>
  </head>
  <body>
    <div class="container" style="max-width: 400px; margin: auto;">
      <div class="card p-4 text-center border-top border-success border-4">
        <h4 class="brand-title mb-2">ผูกบัญชีผู้ป่วย</h4>
        <p class="text-muted small mb-4">เชื่อมต่อข้อมูลการรักษากับ LINE ของท่าน</p>
        
        <div id="profile-area" style="display:none;" class="mb-4 bg-light p-3 rounded border">
          <img id="profile-img" src="" class="rounded-circle mb-2 shadow-sm" width="70" height="70">
          <div id="profile-name" class="fw-bold text-dark"></div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-bold text-secondary">รหัสผู้ป่วย (HN)</label>
          <input type="text" id="hn" class="form-control form-control-lg" placeholder="เช่น 123456" pattern="[0-9]*" inputmode="numeric">
        </div>
        <div class="mb-4 text-start">
          <label class="form-label fw-bold text-secondary">รหัสการเข้ารักษา (AN)</label>
          <input type="text" id="an" class="form-control form-control-lg" placeholder="เช่น 6600123" pattern="[0-9]*" inputmode="numeric">
        </div>
        
        <button id="btn-submit" class="btn btn-success btn-lg w-100 fw-bold py-2 shadow-sm" onclick="submitBinding()" disabled>กำลังโหลดข้อมูล LINE...</button>
        <div id="status-msg" class="mt-3 small fw-bold"></div>
      </div>
    </div>

    <script>
      let currentLineId = "";
      
      // 🚨 1. ใส่ LIFF ID ของคุณหมอตรงนี้
      const LIFF_ID = "2009395948-je5kNUOI"; 
      
      // 🚨 2. เอาลิงก์ Web App (Code.gs) ที่เพิ่ง Deploy ใหม่มาใส่ตรงนี้
      const API_URL = "https://script.google.com/macros/s/AKfycbwPqCZbDF5Lle5EmXtIvb9YLzFP907mV6U6ArRojGOuioGo7lv3WuxhnbOho-Ffcq5wqw/exec?app=3";

      window.onload = function() {
        liff.init({ liffId: LIFF_ID })
          .then(() => {
            if (liff.isLoggedIn()) {
              liff.getProfile().then(profile => {
                currentLineId = profile.userId; 
                document.getElementById('profile-area').style.display = "block";
                document.getElementById('profile-img').src = profile.pictureUrl;
                document.getElementById('profile-name').innerText = "คุณ " + profile.displayName;
                
                let btn = document.getElementById('btn-submit');
                btn.innerText = "ยืนยันการผูกบัญชี";
                btn.disabled = false;
              });
            } else {
              liff.login(); 
            }
          })
          .catch(err => {
            document.getElementById('status-msg').innerText = "Error: " + err.message;
            document.getElementById('status-msg').className = "mt-3 small fw-bold text-danger";
          });
      };

      function submitBinding() {
        const hn = document.getElementById('hn').value.trim();
        const an = document.getElementById('an').value.trim();
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('status-msg');

        if(!hn || !an) {
          msg.innerText = "⚠️ กรุณากรอก HN และ AN ให้ครบถ้วน";
          return;
        }

        btn.innerText = "กำลังบันทึกข้อมูล...";
        btn.disabled = true;
        msg.innerText = "⏳ กำลังส่งข้อมูล...";

        // 🚀 ยิง API ข้ามเซิร์ฟเวอร์ไปหา Code.gs
        fetch(`${API_URL}?action=bindLine&hn=${hn}&an=${an}&lineId=${currentLineId}`)
          .then(response => response.json())
          .then(res => {
            if(res.success) {
               btn.innerText = "สำเร็จ! ปิดหน้าต่างได้เลย";
               btn.classList.replace("btn-success", "btn-secondary");
               msg.innerText = "✅ " + res.message;
               msg.className = "mt-3 small fw-bold text-success";
               setTimeout(() => { liff.closeWindow(); }, 2000); 
            } else {
               btn.innerText = "ลองใหม่อีกครั้ง";
               btn.disabled = false;
               msg.innerText = "❌ " + res.message;
               msg.className = "mt-3 small fw-bold text-danger";
            }
          })
          .catch(err => {
             btn.innerText = "ลองใหม่อีกครั้ง";
             btn.disabled = false;
             msg.innerText = "❌ การเชื่อมต่อขัดข้อง";
             msg.className = "mt-3 small fw-bold text-danger";
          });
      }
    </script>
  </body>

</html>
