<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CVT Master Registry - ลงทะเบียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      /* 🎨 ธีมสีใหม่: CVT Blue (#005691) และ CVT Gold (#D0B184) */
      body { background-color: #f0f3f6; padding: 20px; font-family: sans-serif; } /* พื้นหลังขาวนวล */
      .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 2vh; border: none;}
      
      /* สีขอบด้านบนเปลี่ยนจากเขียวเป็นทอง */
      .border-cvt-gold { border-top: 5px solid #D0B184 !important; }
      
      /* สีข้อความหลักเปลี่ยนจากเขียวเป็นน้ำเงิน */
      .brand-title { color: #005691; font-weight: bold; } 
      
      /* ดีไซน์ปุ่มเมนู */
      .btn-menu { border-radius: 12px; padding: 18px; font-size: 1.15rem; text-align: left; transition: transform 0.2s;}
      .btn-menu:hover { transform: translateY(-3px); }
      .icon-box { font-size: 1.6rem; margin-right: 10px; }
      
      /* CSS สำหรับซ่อนหน้าจอ */
      .hidden-view { display: none !important; }
      
      /* กำหนดสีของฟอร์มผู้ป่วย (น้ำเงิน) และเจ้าหน้าที่ (ทอง) */
      .view-patient-color { color: #005691; }
      .view-staff-color { color: #A68A5F; } /* ทองเข้มหน่อยให้อ่านง่าย */
      
      /* ปรับปรุง Input */
      .form-control { border-radius: 8px; border: 1px solid #ced4da; }
      .form-control:focus { border-color: #005691; box-shadow: 0 0 0 0.2rem rgba(0, 86, 145, 0.25); }
      
    </style>
  </head>

        <p class="text-muted small mb-3">ระบบเชื่อมต่อข้อมูลผ่าน LINE</p>
        
        <div id="profile-area" class="hidden-view mb-3 bg-light p-3 rounded border">

        <div id="loading-msg" class="fw-bold text-secondary my-4">⏳ กำลังโหลดข้อมูล LINE...</div>

          <p class="fw-bold text-dark mb-3">กรุณาเลือกสถานะของท่าน</p>
          <button class="btn btn-outline-primary btn-menu w-100 mb-3 fw-bold shadow-sm" style="border-color: #005691; color: #005691;" onclick="switchView('view-patient')">

          </button>
          <button class="btn btn-outline-secondary btn-menu w-100 mb-2 fw-bold shadow-sm" style="border-color: #D0B184; color: #A68A5F;" onclick="switchView('view-staff')">

          </button>
        </div>

        <div id="view-patient" class="hidden-view">
          <h5 class="fw-bold view-patient-color mb-3">ผูกบัญชีผู้ป่วย</h5>
          <div class="mb-3 text-start">
            <label class="form-label fw-bold text-secondary small">รหัสผู้ป่วย (HN)</label>
            <input type="text" id="hn" class="form-control" placeholder="เช่น 123456" pattern="[0-9]*" inputmode="numeric">
          </div>
          <div class="mb-4 text-start">
            <label class="form-label fw-bold text-secondary small">รหัสการเข้ารักษา (AN)</label>
            <input type="text" id="an" class="form-control" placeholder="เช่น 6600123" pattern="[0-9]*" inputmode="numeric">
          </div>
          
          <button id="btn-submit-patient" class="btn w-100 fw-bold py-2 mb-2 shadow-sm" style="background-color: #005691; color: white;" onclick="submitPatient()">ยืนยันข้อมูลผู้ป่วย</button>
          <button class="btn btn-light w-100 fw-bold py-2 text-muted" onclick="switchView('view-menu')">ย้อนกลับ</button>
          <div id="status-msg-patient" class="mt-2 small fw-bold"></div>
        </div>

        <div id="view-staff" class="hidden-view">
          <h5 class="fw-bold view-staff-color mb-3">ลงทะเบียนเจ้าหน้าที่</h5>
          <div class="mb-3 text-start">
            <label class="form-label fw-bold text-secondary small">Username (รหัสแผนก)</label>
            <input type="text" id="username" class="form-control" placeholder="เช่น ward1">
          </div>
          <div class="mb-4 text-start">
            <label class="form-label fw-bold text-secondary small">Password (รหัสผ่าน)</label>
            <input type="password" id="password" class="form-control" placeholder="****">
          </div>
          
          <button id="btn-submit-staff" class="btn btn-dark w-100 fw-bold py-2 mb-2 shadow-sm" onclick="submitStaff()">เข้าสู่ระบบเจ้าหน้าที่</button>
          <button class="btn btn-light w-100 fw-bold py-2 text-muted" onclick="switchView('view-menu')">ย้อนกลับ</button>
          <div id="status-msg-staff" class="mt-2 small fw-bold"></div>
        </div>

      </div>
    </div>

    <script>
      let currentLineId = "";
      
      // 🚨 ตั้งค่า LIFF ID และ URL เดิม
      const LIFF_ID = "2009395948-je5kNUOI"; 
      const API_URL = "https://script.google.com/macros/s/AKfycbwPqCZbDF5Lle5EmXtIvb9YLzFP907mV6U6ArRojGOuioGo7lv3WuxhnbOho-Ffcq5wqw/exec";

      window.onload = function() {
        liff.init({ liffId: LIFF_ID })
          .then(() => {
            if (liff.isLoggedIn()) {
              liff.getProfile().then(profile => {
                currentLineId = profile.userId; 
                document.getElementById('loading-msg').style.display = "none";
                document.getElementById('profile-area').classList.remove('hidden-view');
                document.getElementById('profile-img').src = profile.pictureUrl;
                document.getElementById('profile-name').innerText = "คุณ " + profile.displayName;
                
                // โชว์เมนูหลัก
                switchView('view-menu');
              });
            } else {
              liff.login(); 
            }
          })
          .catch(err => {
            document.getElementById('loading-msg').innerText = "❌ Error: " + err.message;
            document.getElementById('loading-msg').className = "text-danger";
          });
      };

      // 🔄 ฟังก์ชันสลับหน้าจอ (SPA) เดิม
      function switchView(targetViewId) {
        document.getElementById('view-menu').classList.add('hidden-view');
        document.getElementById('view-patient').classList.add('hidden-view');
        document.getElementById('view-staff').classList.add('hidden-view');
        
        // เคลียร์ข้อความแจ้งเตือน
        document.getElementById('status-msg-patient').innerText = "";
        document.getElementById('status-msg-staff').innerText = "";

        document.getElementById(targetViewId).classList.remove('hidden-view');
      }

      // 🏥 ฟังก์ชันส่งข้อมูลผู้ป่วย (action=bindLine) เดิม
      function submitPatient() {
        const hn = document.getElementById('hn').value.trim();
        const an = document.getElementById('an').value.trim();
        const btn = document.getElementById('btn-submit-patient');
        const msg = document.getElementById('status-msg-patient');

        if(!hn || !an) {
          msg.innerText = "⚠️ กรุณากรอก HN และ AN ให้ครบถ้วน";
          msg.className = "mt-2 small fw-bold text-warning";
          return;
        }

        btn.innerText = "กำลังบันทึก...";
        btn.disabled = true;
        msg.innerText = "⏳ กำลังส่งข้อมูล...";
        msg.className = "mt-2 small fw-bold text-secondary";

        fetch(`${API_URL}?action=bindLine&hn=${hn}&an=${an}&lineId=${currentLineId}`, { method: 'GET', redirect: 'follow' })
          .then(async response => {
            const text = await response.text(); 
            try { return JSON.parse(text); } 
            catch (e) { throw new Error("พบการตอบกลับมาผิดปกติ"); }
          })
          .then(res => {
            if(res.success) {
               btn.innerText = "สำเร็จ!";
               btn.style.backgroundColor = "#00b900"; // สำเร็จใช้สีเขียว LINE เดิม
               btn.style.borderColor = "#00b900";
               msg.innerText = "✅ " + res.message;
               msg.className = "mt-2 small fw-bold text-success";
               setTimeout(() => { liff.closeWindow(); }, 2000); 
            } else {
               btn.innerText = "ยืนยันข้อมูลผู้ป่วย";
               btn.style.backgroundColor = "#005691";
               btn.disabled = false;
               msg.innerText = "❌ " + res.message;
               msg.className = "mt-2 small fw-bold text-danger";
            }
          })
          .catch(err => {
             btn.innerText = "ยืนยันข้อมูลผู้ป่วย";
             btn.style.backgroundColor = "#005691";
             btn.disabled = false;
             msg.innerText = "❌ ขัดข้อง: " + err.message; 
             msg.className = "mt-2 small fw-bold text-danger";
          });
      }

      // 👨‍⚕️ ฟังก์ชันส่งข้อมูลเจ้าหน้าที่ (action=bindStaffLine) เดิม
      function submitStaff() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const btn = document.getElementById('btn-submit-staff');
        const msg = document.getElementById('status-msg-staff');

        if(!user || !pass) {
          msg.innerText = "⚠️ กรุณากรอก Username และ Password ให้ครบ";
          msg.className = "mt-2 small fw-bold text-warning";
          return;
        }

        btn.innerText = "กำลังตรวจสอบ...";
        btn.disabled = true;
        msg.innerText = "⏳ กำลังส่งข้อมูล...";
        msg.className = "mt-2 small fw-bold text-secondary";

        fetch(`${API_URL}?action=bindStaffLine&username=${user}&password=${pass}&lineId=${currentLineId}`, { method: 'GET', redirect: 'follow' })
          .then(async response => {
            const text = await response.text(); 
            try { return JSON.parse(text); } 
            catch (e) { throw new Error("พบการตอบกลับมาผิดปกติ"); }
          })
          .then(res => {
            if(res.success) {
               btn.innerText = "เข้าสู่ระบบสำเร็จ!";
               btn.classList.replace("btn-dark", "btn-success");
               msg.innerText = "✅ " + res.message;
               msg.className = "mt-2 small fw-bold text-success";
               setTimeout(() => { liff.closeWindow(); }, 2000); 
            } else {
               btn.innerText = "เข้าสู่ระบบเจ้าหน้าที่";
               btn.disabled = false;
               msg.innerText = "❌ " + res.message;
               msg.className = "mt-2 small fw-bold text-danger";
            }
          })
          .catch(err => {
             btn.innerText = "เข้าสู่ระบบเจ้าหน้าที่";
             btn.disabled = false;
             msg.innerText = "❌ ขัดข้อง: " + err.message; 
             msg.className = "mt-2 small fw-bold text-danger";
          });
      }
    </script>
  </body>
</html>
