<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CVT Master Registry - ลงทะเบียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      /* 🎨 พื้นหลัง (Body): ไล่สีให้เข้มขึ้นนิดนึง เวลาทะลุกระจกจะได้สวยๆ */
      body { 
        background: linear-gradient(135deg, #cce0f4 0%, #e6f2fd 40%, #fdf5e8 100%);
        padding: 20px; 
        font-family: sans-serif; 
        min-height: 100vh; 
        display: flex;
        align-items: center; 
      }
      
      /* 🪟 กล่องหลัก (Card): เปลี่ยนเป็น "กระจกฝ้าโปร่งแสง" */
      .card { 
        border-radius: 20px; 
        /* 🚨 ลดความทึบของสีขาวลงเหลือแค่ 60% ให้ทะลุเห็นพื้นหลัง! */
        background: rgba(255, 255, 255, 0.6);
        /* เอฟเฟกต์เบลอพื้นหลังที่ทะลุเข้ามา (Glassmorphism) */
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        /* ใส่ขอบขาวบางๆ รอบกล่อง ให้ดูเป็นแผ่นกระจกของจริง */
        border: 1px solid rgba(255, 255, 255, 0.8) !important;
        box-shadow: 0 15px 35px rgba(0, 86, 145, 0.1); 
        width: 100%;
        position: relative;
        overflow: hidden;
      }

      /* 🥇 แถบสีทองด้านบนกล่อง (ทำให้ดูเนียนกว่าการใช้ border-top) */
      .card::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, #D0B184, #e8d0a9, #D0B184);
      }
      
      .brand-title { color: #005691; font-weight: bold; } 
      
      /* 🖱️ กล่องปุ่มเมนู: ทำเป็นกระจกโปร่งแสงตามไปด้วย */
      .btn-menu { 
        border-radius: 12px; 
        padding: 18px; 
        font-size: 1.15rem; 
        text-align: left; 
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.9);
        color: #005691 !important; /* บังคับตัวอักษรสีน้ำเงิน */
        transition: all 0.2s ease-in-out;
      }
      /* เอฟเฟกต์เวลาแตะปุ่ม */
      .btn-menu:hover, .btn-menu:active { 
        transform: translateY(-3px); 
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 8px 20px rgba(0, 86, 145, 0.15) !important;
      }
      .icon-box { font-size: 1.6rem; margin-right: 10px; }
      
      .hidden-view { display: none !important; }
      .view-patient-color { color: #005691; }
      .view-staff-color { color: #A68A5F; } 
      
      /* ⌨️ ช่องกรอกข้อมูล (Input) */
      .form-control { 
        border-radius: 10px; 
        border: 1px solid rgba(0, 86, 145, 0.2); 
        padding: 12px;
        background-color: rgba(255, 255, 255, 0.7); 
      }
      .form-control:focus { 
        border-color: #005691; 
        box-shadow: 0 0 0 0.25rem rgba(0, 86, 145, 0.15); 
        background-color: #ffffff;
      }
    </style>
  </head>
